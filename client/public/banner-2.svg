<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7FAFC;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EBF4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0FAFC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#005EB8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0074e4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#005EB8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A2540;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#005EB8" flood-opacity="0.18" />
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="50" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="500" fill="url(#bg2)" />

  <!-- Soft glow circles -->
  <circle cx="300" cy="500" r="300" fill="#16C7D9" opacity="0.06" filter="url(#blur2)" />
  <circle cx="1400" cy="0" r="280" fill="#005EB8" opacity="0.07" filter="url(#blur2)" />

  <!-- Dot grid -->
  <pattern id="dots2" width="36" height="36" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.2" fill="#005EB8" opacity="0.05" />
  </pattern>
  <rect width="1600" height="500" fill="url(#dots2)" />

  <!-- Left side — large card stack -->
  <!-- Card 1 (back) -->
  <rect x="60" y="80" width="340" height="200" rx="20" fill="url(#card2)" opacity="0.15" transform="rotate(-6, 230, 180)" />
  <!-- Card 2 (mid) -->
  <rect x="60" y="80" width="340" height="200" rx="20" fill="url(#card2)" opacity="0.25" transform="rotate(-2, 230, 180)" />
  <!-- Card 3 (front) main card -->
  <rect x="60" y="80" width="340" height="200" rx="20" fill="url(#card2)" filter="url(#shadow2)" />
  <!-- Card content -->
  <text x="100" y="130" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#16C7D9" letter-spacing="2">TEMP-CONTROLLED</text>
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="white">IVF · Oncology</text>
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="white">Transplant Medicines</text>
  <text x="100" y="230" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.6">Delivered at 2°C–8°C safely</text>
  <!-- Thermometer icon on card -->
  <rect x="340" y="110" width="40" height="100" rx="20" fill="rgba(22,199,217,0.2)" />
  <rect x="350" y="175" width="20" height="30" rx="10" fill="#16C7D9" />
  <rect x="354" y="120" width="12" height="60" rx="6" fill="#16C7D9" opacity="0.5" />

  <!-- Mini pills floating -->
  <rect x="50" y="310" width="90" height="34" rx="17" fill="#005EB8" opacity="0.15" transform="rotate(-15, 95, 327)" />
  <rect x="160" y="330" width="70" height="28" rx="14" fill="#16C7D9" opacity="0.2" transform="rotate(10, 195, 344)" />

  <!-- RIGHT CONTENT -->
  <text x="550" y="120" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#005EB8" letter-spacing="3">rhoseatte</text>

  <!-- Heading -->
  <text x="550" y="185" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#0A2540" letter-spacing="-1">Temp-Controlled</text>
  <text x="550" y="248" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#005EB8" letter-spacing="-1">Delivery Ready</text>
  <text x="550" y="300" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0A2540" opacity="0.7">2°C – 8°C · Pan-India Coverage</text>

  <!-- Feature chips -->
  <rect x="550" y="325" width="170" height="38" rx="10" fill="rgba(0,94,184,0.08)" stroke="#005EB8" stroke-width="1.2" />
  <text x="635" y="349" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#005EB8" text-anchor="middle">❄ IVF Medicines</text>

  <rect x="734" y="325" width="170" height="38" rx="10" fill="rgba(0,94,184,0.08)" stroke="#005EB8" stroke-width="1.2" />
  <text x="819" y="349" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#005EB8" text-anchor="middle">🔬 Oncology Drugs</text>

  <rect x="918" y="325" width="170" height="38" rx="10" fill="rgba(0,94,184,0.08)" stroke="#005EB8" stroke-width="1.2" />
  <text x="1003" y="349" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#005EB8" text-anchor="middle">💊 Biologics</text>

  <!-- CTA -->
  <rect x="550" y="385" width="210" height="52" rx="14" fill="url(#blue2)" />
  <text x="655" y="417" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="white" text-anchor="middle">Enquire Now →</text>

  <rect x="778" y="385" width="210" height="52" rx="14" fill="rgba(37,211,102,0.9)" />
  <text x="883" y="417" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">📱 WhatsApp</text>

  <!-- Right decoration — large temperature gauge -->
  <circle cx="1400" cy="250" r="170" fill="none" stroke="#DCE7F2" stroke-width="2" />
  <circle cx="1400" cy="250" r="130" fill="none" stroke="#DCE7F2" stroke-width="1" />
  <circle cx="1400" cy="250" r="90" fill="rgba(0,94,184,0.04)" stroke="#005EB8" stroke-width="1" opacity="0.4" />
  <text x="1400" y="230" font-family="Arial, sans-serif" font-size="44" font-weight="900" fill="#005EB8" text-anchor="middle">2°C</text>
  <text x="1400" y="262" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0A2540" text-anchor="middle" opacity="0.5">to</text>
  <text x="1400" y="296" font-family="Arial, sans-serif" font-size="44" font-weight="900" fill="#16C7D9" text-anchor="middle">8°C</text>
  <text x="1400" y="340" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#0A2540" text-anchor="middle" opacity="0.45" letter-spacing="1">TEMP-CONTROLLED CERTIFIED</text>

  <!-- Bottom bar -->
  <rect x="0" y="472" width="1600" height="28" fill="rgba(0,94,184,0.06)" />
  <text x="800" y="491" font-family="Arial, sans-serif" font-size="11" fill="#005EB8" opacity="0.5" text-anchor="middle" letter-spacing="2">rhoseatte.com · rhoseatte@gmail.com · +91 95602 47619</text>
</svg>
