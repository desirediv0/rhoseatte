<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="mbg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2540" />
      <stop offset="100%" style="stop-color:#005EB8" />
    </linearGradient>
    <linearGradient id="mcyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16C7D9" />
      <stop offset="100%" style="stop-color:#0aa8b8" />
    </linearGradient>
    <filter id="mblur">
      <feGaussianBlur stdDeviation="50" />
    </filter>
  </defs>

  <rect width="800" height="1000" fill="url(#mbg1)" />

  <!-- Glow circles -->
  <circle cx="700" cy="100" r="300" fill="#16C7D9" opacity="0.07" filter="url(#mblur)" />
  <circle cx="100" cy="900" r="250" fill="#16C7D9" opacity="0.06" filter="url(#mblur)" />

  <!-- Cross decoration -->
  <rect x="580" y="80" width="40" height="180" rx="8" fill="white" opacity="0.04" />
  <rect x="520" y="140" width="160" height="40" rx="8" fill="white" opacity="0.04" />

  <!-- Pattern -->
  <pattern id="mdots" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.2" fill="white" opacity="0.04" />
  </pattern>
  <rect width="800" height="1000" fill="url(#mdots)" />

  <!-- Logo area -->
  <rect x="60" y="60" width="200" height="40" rx="8" fill="rgba(22,199,217,0.12)" stroke="#16C7D9" stroke-width="1" />
  <text x="160" y="86" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="#16C7D9" text-anchor="middle" letter-spacing="1">rhoseatte</text>

  <!-- Heading -->
  <text x="60" y="175" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="white">Trusted</text>
  <text x="60" y="238" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="white">Specialty</text>
  <text x="60" y="301" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#16C7D9">Medicines</text>
  <text x="60" y="355" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="white" opacity="0.8">Across India</text>

  <!-- Subtext -->
  <text x="60" y="405" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.6">Genuine branded medicines</text>
  <text x="60" y="428" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.6">IVF · Oncology · Transplant · Temp-Controlled</text>

  <!-- Trust badges row -->
  <rect x="60" y="460" width="195" height="40" rx="10" fill="rgba(22,199,217,0.15)" stroke="#16C7D9" stroke-width="1" />
  <text x="157.5" y="485" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#16C7D9" text-anchor="middle">❄ Temp-Controlled 2°–8°C</text>

  <rect x="268" y="460" width="130" height="40" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
  <text x="333" y="485" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">✓ Genuine</text>

  <!-- Large central illustration -->
  <circle cx="400" cy="680" r="230" fill="rgba(22,199,217,0.05)" stroke="rgba(22,199,217,0.15)" stroke-width="1.5" />
  <circle cx="400" cy="680" r="170" fill="rgba(0,94,184,0.1)" stroke="rgba(255,255,255,0.07)" stroke-width="1" />
  <circle cx="400" cy="680" r="100" fill="rgba(0,94,184,0.15)" />

  <!-- Cross in circle -->
  <rect x="388" y="625" width="24" height="110" rx="5" fill="white" opacity="0.18" />
  <rect x="345" y="668" width="110" height="24" rx="5" fill="white" opacity="0.18" />

  <!-- Pill shapes -->
  <rect x="260" y="610" width="100" height="38" rx="19" fill="rgba(22,199,217,0.2)" transform="rotate(-30, 310, 629)" />
  <rect x="440" y="730" width="90" height="34" rx="17" fill="rgba(255,255,255,0.1)" transform="rotate(20, 485, 747)" />

  <!-- Float badges -->
  <rect x="60" y="800" width="200" height="50" rx="12" fill="rgba(0,0,0,0.3)" stroke="rgba(22,199,217,0.4)" stroke-width="1" />
  <text x="160" y="830" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#16C7D9" text-anchor="middle">Pan-India Delivery</text>
  <text x="160" y="848" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.5">Express &amp; Standard</text>

  <rect x="280" y="800" width="180" height="50" rx="12" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
  <text x="370" y="830" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">100% Genuine</text>
  <text x="370" y="848" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.5">Verified Sources</text>

  <!-- CTA buttons -->
  <rect x="60" y="880" width="310" height="58" rx="16" fill="url(#mcyan)" />
  <text x="215" y="916" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="white" text-anchor="middle">Shop Medicines →</text>

  <rect x="390" y="880" width="310" height="58" rx="16" fill="rgba(37,211,102,0.9)" />
  <text x="545" y="916" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="white" text-anchor="middle">📱 WhatsApp Us</text>

  <!-- Bottom -->
  <rect x="0" y="970" width="800" height="30" fill="rgba(0,0,0,0.2)" />
  <text x="400" y="990" font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.4" text-anchor="middle">rhoseatte@gmail.com · +91 95602 47619</text>
</svg>
