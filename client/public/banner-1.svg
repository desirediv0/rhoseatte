<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2540;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#005EB8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0074e4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyan1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16C7D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0aa8b8;stop-opacity:1" />
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="500" fill="url(#bg1)" />

  <!-- Decorative circles -->
  <circle cx="1300" cy="-100" r="350" fill="#16C7D9" opacity="0.08" filter="url(#blur1)" />
  <circle cx="200" cy="600" r="300" fill="#16C7D9" opacity="0.06" filter="url(#blur1)" />
  <circle cx="1500" cy="400" r="200" fill="#ffffff" opacity="0.03" filter="url(#blur1)" />

  <!-- Medical cross decoration right side -->
  <rect x="1150" y="120" width="50" height="260" rx="12" fill="white" opacity="0.05" />
  <rect x="1050" y="220" width="250" height="60" rx="12" fill="white" opacity="0.05" />

  <!-- Large circle outline right -->
  <circle cx="1350" cy="250" r="220" fill="none" stroke="white" stroke-width="1" opacity="0.06" />
  <circle cx="1350" cy="250" r="160" fill="none" stroke="#16C7D9" stroke-width="1" opacity="0.1" />

  <!-- Dot grid pattern -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="white" opacity="0.04" />
  </pattern>
  <rect width="1600" height="500" fill="url(#dots)" />

  <!-- LEFT CONTENT -->
  <!-- Pill badge -->
  <rect x="80" y="80" width="240" height="36" rx="18" fill="rgba(22,199,217,0.15)" stroke="#16C7D9" stroke-width="1" opacity="0.8" />
  <text x="200" y="104" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#16C7D9" text-anchor="middle" letter-spacing="2">TRUSTED PHARMA PLATFORM</text>

  <!-- Main heading -->
  <text x="80" y="175" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="white" letter-spacing="-1">Trusted Specialty</text>
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="#16C7D9" letter-spacing="-1">Medicines</text>
  <text x="80" y="305" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="white" opacity="0.9">Across India</text>

  <!-- Subtext -->
  <text x="80" y="355" font-family="Arial, sans-serif" font-size="17" fill="white" opacity="0.65">Genuine branded medicines · IVF · Oncology · Transplant · Temp-Controlled</text>

  <!-- CTA Button -->
  <rect x="80" y="390" width="200" height="52" rx="14" fill="url(#cyan1)" />
  <text x="180" y="422" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="white" text-anchor="middle">Shop Medicines →</text>

  <!-- WhatsApp button -->
  <rect x="300" y="390" width="220" height="52" rx="14" fill="none" stroke="white" stroke-width="1.5" opacity="0.5" />
  <text x="410" y="422" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle" opacity="0.85">📱 WhatsApp Us</text>

  <!-- RIGHT — pill/medicine illustration -->
  <!-- Large glowing orb -->
  <circle cx="1200" cy="250" r="180" fill="rgba(22,199,217,0.06)" stroke="rgba(22,199,217,0.2)" stroke-width="1.5" />
  <circle cx="1200" cy="250" r="130" fill="rgba(0,94,184,0.15)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />

  <!-- Pill capsule -->
  <rect x="1120" y="195" width="160" height="60" rx="30" fill="white" opacity="0.12" />
  <rect x="1120" y="195" width="80" height="60" rx="30" fill="url(#cyan1)" opacity="0.5" />
  <line x1="1200" y1="195" x2="1200" y2="255" stroke="white" stroke-width="1" opacity="0.3" />

  <!-- Pill 2 -->
  <rect x="1090" y="270" width="120" height="45" rx="22" fill="white" opacity="0.08" transform="rotate(-30, 1150, 292)" />

  <!-- Medical cross in center -->
  <rect x="1188" y="220" width="24" height="60" rx="4" fill="white" opacity="0.2" />
  <rect x="1168" y="240" width="64" height="20" rx="4" fill="white" opacity="0.2" />

  <!-- Float badges -->
  <rect x="1000" y="130" width="160" height="44" rx="10" fill="rgba(0,0,0,0.3)" stroke="rgba(22,199,217,0.4)" stroke-width="1" />
  <text x="1080" y="158" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#16C7D9" text-anchor="middle">❄ Temp-Controlled 2°–8°C</text>

  <rect x="1020" y="310" width="150" height="44" rx="10" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
  <text x="1095" y="338" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">✓ 100% Genuine</text>

  <rect x="1340" y="200" width="160" height="44" rx="10" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
  <text x="1420" y="228" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">🚚 Pan-India Delivery</text>

  <!-- Bottom brand strip -->
  <rect x="0" y="470" width="1600" height="30" fill="rgba(0,0,0,0.25)" />
  <text x="800" y="491" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.5" text-anchor="middle" letter-spacing="3">rhoseatte.com · rhoseatte@gmail.com · +91 95602 47619</text>
</svg>
